# =====================================================================
# Track 1 — Smart Router. EVERYTHING is configurable here, nothing hardcoded.
# Env overrides: LOCAL_MODEL_PATH, INPUT_PATH, OUTPUT_PATH,
#                CONFIG_PATH, FIREWORKS_MODE (mock|live|auto)
# =====================================================================

io:
  input_path: /input/tasks.json      # Participant Guide format
  output_path: /output/results.json

cache:
  enabled: true          # intra-run cache (identical normalized prompts). Never persisted across runs.

solvers:
  enabled: true
  # QUALIFICATION PROFILE (post ACCURACY_GATE_FAILED @36.8%, July 10): only the
  # exact-arithmetic solver stays; sentiment lexicon and NER gazetteers are too
  # risky on unseen variants until the gate is passed. Descend the ladder
  # (re-add: sentiment, ner, factual) one submission at a time AFTER a pass.
  use: [math]
  min_confidence: 0.75   # below this, ignore the solver and fall through to the local LLM

local:
  model_path: models/model.gguf     # override: LOCAL_MODEL_PATH (=/models/model.gguf in the image)
  n_ctx: 2048
  n_threads: 0                      # 0 = auto (os.cpu_count())
  temperature: 0.1
  system_prompt: "You are a precise assistant. Answer in English, directly and concisely. No preamble."
  category_hints:
    math: "Compute step by step briefly, then give the final numeric answer on the last line."
    summarization: "Respect the requested length exactly (one sentence means exactly ONE sentence)."
    sentiment: "Give the sentiment label (positive / negative / mixed / neutral) and one short justification."
    ner: "List each entity with its type (person, organization, location, date)."
    code_debugging: "State the bug in one line, then give the corrected code."
    code_generation: "Return only the code with minimal comments."
    logic: "State the final answer first, then one line of justification."
    factual: "Answer in one or two sentences."
  max_tokens:
    default: 160
    sentiment: 80
    summarization: 100
    ner: 140
    factual: 140
    math: 220
    logic: 180
    code_debugging: 300
    code_generation: 300

gate:
  enabled: true
  thresholds:            # minimum confidence to KEEP the local answer (otherwise escalate)
    default: 0.6
    sentiment: 0.45
    summarization: 0.45
    ner: 0.5
    factual: 0.55
    math: 0.8
    logic: 0.8
    code_debugging: 0.7
    code_generation: 0.7
  self_consistency:      # local resampling (0 Fireworks tokens, costs CPU time)
    enabled: false       # n=2 proved flaky (agrees on wrong answers); moot while
    categories: [math, logic]   # math/logic are in escalation.always below
    samples: 2           # total number of samples (2 = 1 resample)
    temperature: 0.7

escalation:
  enabled: true          # escalate_enabled
  never: []              # categories never escalated
  # QUALIFICATION PROFILE: escalate everything (solver-answered tasks excepted).
  # First priority is passing the 80% gate — est. ~2,800 tokens, still 35% under
  # the current leader. After a posted pass, descend the ladder one submission
  # at a time: restore local for summarization/code (verifiable), then
  # sentiment/NER solvers, then enable escalation batching (measured 684 tk).
  always: [math, logic, factual, sentiment, summarization, ner,
           code_debugging, code_generation]
  system_prompt: "Answer directly and concisely in English. No preamble, do not restate the question."
  category_instructions:
    # Measured via Mammouth/kimi 2026-07-10: answer-only keeps 19/19 (kimi bills
    # its internal thinking anyway, visible working is redundant) and saves 15%.
    math: "Give only the final numeric answer."
    sentiment: "Give the label and one short justification."
    summarization: "Respect the requested length exactly."
    ner: "List entities as 'text - type' only."
    code_debugging: "State the bug in one line, then the corrected code only."
    code_generation: "Return only the code."
    logic: "Answer with only the correct name or label, using the exact wording from the question."
    factual: "Two sentences maximum."
  # Caps are a safety guillotine, NOT a saving: billing counts tokens actually
  # generated (my5757980's measured finding). Tight caps are CATASTROPHIC with
  # thinking models: internal reasoning eats the budget before the visible
  # answer -> empty content -> garbage fallback shipped (root cause of the
  # 36.8% ACCURACY_GATE_FAILED on July 10: sentiment was capped at 60 while
  # kimi thinks for 50-200 tokens).
  max_tokens:
    default: 600
    sentiment: 500
    summarization: 500
    ner: 500
    factual: 500
    math: 500
    logic: 500
    code_debugging: 800
    code_generation: 800
  batch:                 # group escalations into one call (yassai measured batching as
    enabled: false       # the dominant token lever). Single point of failure: parse
    max_tasks: 10        # failures fall back to per-task calls. Enable after a posted score.
  max_prompt_chars: 6000 # truncate abnormally long prompts before sending
  stop: []
  extra_params: {}       # passed verbatim to the chat API (extra_body). Candidate once
                         # real credits arrive: {reasoning_effort: none} — measured by
                         # omerdduran/token-router: minimax-m3 16/19 with it, but
                         # gemma-4 returns EMPTY content under it. Test before enabling.
  model_preference:      # substrings matched against ALLOWED_MODELS (env) at runtime
    # Calibrated 2026-07-10 via Mammouth on the real model families:
    # kimi-k2.7-code 19/19 @ 1,059 tk vs minimax-m3 18/19 @ 1,622 tk
    # (minimax reasoning overflowed into answers despite extract_text fallback)
    default: [kimi, minimax]
    code_debugging: [kimi, minimax]
    code_generation: [kimi, minimax]

mock:
  completion_ratio: 0.6  # simulated output tokens = ratio * max_tokens (conservative estimate)

limits:
  per_task_seconds: 25        # beyond this: warning in the logs only
  total_budget_seconds: 480   # soft deadline (grading limit: 600 s). Past it, the router
                              # skips slow local inference and goes solver/escalation only,
                              # so the run always finishes with a complete results.json.
