io:
  input_path: /input/tasks.json
  output_path: /output/results.json
cache:
  enabled: true
solvers:
  enabled: true
  use:
  - math
  - sentiment
  - ner
  min_confidence: 0.75
  ner_backend: spacy
local:
  model_path: models/model.gguf
  n_ctx: 2048
  n_threads: 0
  temperature: 0.1
  system_prompt: You are a precise assistant. Answer in English, directly and concisely.
    No preamble.
  category_hints:
    math: Compute step by step briefly, then give the final numeric answer on the
      last line.
    summarization: Respect the requested length exactly (one sentence means exactly
      ONE sentence). Cover the main point AND any contrasting caveat from the source.
    sentiment: Give the sentiment label (positive / negative / mixed / neutral) and
      one short justification.
    ner: List each entity with its type (person, organization, location, date).
    code_debugging: State the bug in one line, then give the corrected code.
    code_generation: Return only the code with minimal comments.
    logic: State the final answer first, then one line of justification.
    factual: Answer in one or two sentences.
  max_tokens:
    default: 160
    sentiment: 80
    summarization: 100
    ner: 140
    factual: 140
    math: 220
    logic: 180
    code_debugging: 300
    code_generation: 300
gate:
  enabled: true
  thresholds:
    default: 0.6
    sentiment: 0.45
    summarization: 0.45
    ner: 0.5
    factual: 0.55
    math: 0.8
    logic: 0.8
    code_debugging: 0.7
    code_generation: 0.7
  self_consistency:
    enabled: false
    categories:
    - math
    - logic
    samples: 2
    temperature: 0.7
escalation:
  enabled: true
  never: []
  # v24: categories whose answers cannot be VERIFIED for free escalate;
  # summarization / code_generation / sentiment / ner are answered locally
  # behind their free verifiers (sentence counts, ast.parse, solver confidence).
  always:
  - factual
  - math
  - logic
  - code_debugging
  fallback_models:
  - kimi-k2p7-code
  - minimax-m3
  system_prompt: Answer concisely in English.
  category_instructions:
    code_debugging: Bug in one line, then corrected code only.
    code_generation: Code only.
    factual: At most two sentences.
    logic: Only the name or label, exact wording from the question.
    math: Final numeric answer only.
    ner: List entities as 'text - type' only.
    sentiment: Label plus one short justification.
    summarization: Respect the requested length exactly.
  max_tokens:
    default: 600
    sentiment: 500
    summarization: 500
    ner: 500
    factual: 500
    math: 500
    logic: 500
    code_debugging: 800
    code_generation: 800
  batch:
    enabled: false
    max_tasks: 10
    timeout_seconds: 90
    solo_categories:
    - logic
  max_prompt_chars: 6000
  stop: []
  extra_params: {}
  extra_params_reasoning: {}
  model_preference:
    default:
    - kimi
    - minimax
    code_debugging:
    - kimi
    - minimax
    code_generation:
    - kimi
    - minimax
mock:
  completion_ratio: 0.6
limits:
  per_task_seconds: 25
  total_budget_seconds: 480
  hard_cap_seconds: 540
